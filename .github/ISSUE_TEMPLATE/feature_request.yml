name: Feature Request
description: Suggest an idea or improvement for a product.
labels: ["type: feature"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which product is this feature request for?
      options:
        - GhostWin
        - RDP Heartbeat
        - RDP Clipboard Anchor
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve? What are you trying to do?
      placeholder: I'm frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references.
